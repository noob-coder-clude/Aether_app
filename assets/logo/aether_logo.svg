<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="aetherGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#FF007F"/>
    </linearGradient>
    <linearGradient id="aetherGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Dark Canvas -->
  <rect width="512" height="512" rx="110" fill="#0B0E14"/>

  <!-- Glowing Outer Rings -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#aetherGrad1)" stroke-width="14" opacity="0.4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#aetherGrad1)" stroke-width="16"/>
  <circle cx="256" cy="256" r="115" fill="none" stroke="url(#aetherGrad2)" stroke-width="10" stroke-dasharray="20 10"/>

  <!-- Aether stylized 'A' & Celestial Tunnel -->
  <path d="M 256,136 L 186,316 M 256,136 L 326,316" fill="none" stroke="url(#aetherGrad1)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="211" y1="266" x2="301" y2="266" stroke="url(#aetherGrad2)" stroke-width="14" stroke-linecap="round"/>

  <!-- Core Celestial Energy Orb -->
  <circle cx="256" cy="256" r="18" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="10" fill="#FFFFFF"/>
</svg>
