name: Build Aether Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Auto Fix Flutter 3.22 API Compatibility
        run: |
          mkdir -p assets/bin assets/logo
          sed -i 's/intl: \^0.19.0/intl: \^0.20.2/g' pubspec.yaml
          sed -i "s/label: 'Tunnel'/text: 'Tunnel'/g; s/label: 'Config'/text: 'Config'/g; s/label: 'Logs'/text: 'Logs'/g; s/label: 'Updates'/text: 'Updates'/g" lib/main.dart
          sed -i "s/cardTheme: CardTheme(/cardTheme: CardThemeData(/g" lib/theme/app_theme.dart
          sed -i "s/CrossAlignment.start/CrossAxisAlignment.start/g" lib/screens/home_screen.dart lib/screens/update_screen.dart
          sed -i 's/package="com.cluvex.aether"//g' android/app/src/main/AndroidManifest.xml || true

      - name: Download Aether Native Core Binaries
        run: |
          chmod +x scripts/download_aether_binaries.sh
          ./scripts/download_aether_binaries.sh

      - name: Install Dependencies
        run: flutter pub get

      - name: Build R8 Minified Release APK
        run: flutter build apk --release

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aether-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
