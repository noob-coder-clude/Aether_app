name: Build Aether Release APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create Temporary Flutter Project
        run: |
          cd /tmp
          flutter config --no-analytics
          flutter create --org com.cluvex --project-name aether_app temp_flutter
          
      - name: Copy Source Code to Flutter Project
        run: |
          # Remove default Flutter code directories but keep gradle settings
          rm -rf /tmp/temp_flutter/lib
          rm -rf /tmp/temp_flutter/assets
          
          # Copy our lib and assets
          cp -r /home/runner/work/Aether_app/Aether_app/lib /tmp/temp_flutter/
          cp -r /home/runner/work/Aether_app/Aether_app/assets /tmp/temp_flutter/
          cp /home/runner/work/Aether_app/Aether_app/pubspec.yaml /tmp/temp_flutter/
          cp /home/runner/work/Aether_app/Aether_app/scripts/*.sh /tmp/temp_flutter/scripts/
          
          # Copy our Kotlin files to proper location
          rm -rf /tmp/temp_flutter/android/app/src/main/kotlin
          mkdir -p /tmp/temp_flutter/android/app/src/main/kotlin/com/cluvex/aether
          cp -r /home/runner/work/Aether_app/Aether_app/android/app/src/main/kotlin/com/cluvex/aether/* /tmp/temp_flutter/android/app/src/main/kotlin/com/cluvex/aether/
          
          # Copy AndroidManifest.xml
          cp /home/runner/work/Aether_app/Aether_app/android/app/src/main/AndroidManifest.xml /tmp/temp_flutter/android/app/src/main/
          
          ls -la /tmp/temp_flutter/

      - name: Download Aether Native Binaries
        run: |
          chmod +x /tmp/temp_flutter/scripts/download_aether_binaries.sh
          /tmp/temp_flutter/scripts/download_aether_binaries.sh
          
      - name: Install Dependencies
        working-directory: /tmp/temp_flutter
        run: flutter pub get

      - name: Build Release APK  
        working-directory: /tmp/temp_flutter
        run: flutter build apk --release --build-number=1 --build-name=1.2.0

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Aether-release-apk
          path: /tmp/temp_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.0-${{ github.run_number }}
          name: Aether v1.2.0 Build ${{ github.run_number }}
          files: /tmp/temp_flutter/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          prerelease: false