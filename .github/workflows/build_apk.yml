name: Build Aether Release APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup project (local.properties + gradle wrapper)
        run: |
          # Create local.properties with Flutter SDK path
          echo "flutter.sdk=$(dirname $(dirname $(which flutter)))" > android/local.properties
          cat android/local.properties
          
          # Create gradle wrapper using flutter's built-in command
          cd android
          flutter config --no-analytics
          cd ..

      - name: Download Aether Native Core Binaries
        run: |
          chmod +x scripts/download_aether_binaries.sh
          ./scripts/download_aether_binaries.sh

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release 2>&1 | tee /tmp/flutter_build.log

      - name: Show build errors on failure
        if: failure()
        run: |
          echo "==== Flutter build errors ===="
          grep -iE "error|fail|exception|unresolved|\.dart:|\.kt:" /tmp/flutter_build.log || true
          echo "==== last 100 lines ===="
          tail -100 /tmp/flutter_build.log || true

      - name: Upload Release APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Aether-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.0-${{ github.run_number }}
          name: Aether v1.2.0 Build ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          prerelease: false